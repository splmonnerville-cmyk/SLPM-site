<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bandeau rouge responsive</title>
  <style>
    /* Style du bandeau /


    / Responsive pour petits écrans */
    @media (max-width: 600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        padding: 1rem;
      }
      nav {
        flex-direction: column;
        width: 100%;
      }
      nav a {
        padding: 0.75rem 0;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Syndicat Populaire Lycéen</div>
    <nav aria-label="Navigation principale">
      <a href="#">Accueil</a>
      <a href="#">Le syndicat</a>
      <a href="#">Nos objectifs</a>
      <a href="#">Nos actions</a>
      <a href="#">Actualités</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <main style="padding: 2rem;">
    <h1>Contenu principal</h1>
    <p>Le bandeau rouge ci-dessus s’adapte correctement sur mobile et PC.</p>
  </main>
</body>
</html>


<footer>
    <p>© 2026 – Syndicat Populaire Lycéen de Monnerville</p>
</footer>

</body>
</html>
